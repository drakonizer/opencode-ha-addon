name: OpenCode
version: "1.1.0"
slug: opencode
description: OpenCode AI coding assistant for Home Assistant — accessible via sidebar with full HA entity access
url: https://github.com/drakonizer/opencode-ha-addon
arch:
  - amd64
  - aarch64
init: false
startup: application
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-outline
panel_title: OpenCode
host_network: false
hassio_api: true
homeassistant_api: true
map:
  - config:rw
  - ssl:ro
  - addon_configs:rw
options:
  provider: "anthropic"
  api_key: ""
  model: ""
  small_model: ""
  ollama_host: ""
  ollama_keep_alive: ""
  github_token: ""
schema:
  provider: str
  api_key: "password?"
  model: "str?"
  small_model: "str?"
  ollama_host: "str?"
  ollama_keep_alive: "str?"
  github_token: "password?"
boot: auto
